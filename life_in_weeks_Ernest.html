<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life in Weeks</title>
    <style>
        :root {
            --bg-1: #f5f9f3;
            --bg-2: #e8f1e5;
            --card: #ffffff;
            --ink: #13211a;
            --muted: #5d6d64;
            --accent: #1f7a4c;
            --accent-soft: #d8f0e0;
            --stroke: #cad7cd;
            --empty: #f6fbf7;
            --dot-size: 10px;
            --dot-gap: 2px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--ink);
            background:
                radial-gradient(1000px 500px at 10% 0%, #e7f5ea 0%, transparent 60%),
                radial-gradient(800px 500px at 100% 100%, #e6efe1 0%, transparent 55%),
                linear-gradient(180deg, var(--bg-1), var(--bg-2));
            font-family: "Space Grotesk", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
            min-height: 100vh;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 16px 56px;
        }

        .hero {
            text-align: center;
            margin-bottom: 20px;
            animation: rise 500ms ease-out;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(30px, 5vw, 56px);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: clamp(14px, 2.2vw, 19px);
        }

        .panel {
            background: color-mix(in srgb, var(--card) 92%, transparent);
            border: 1px solid color-mix(in srgb, var(--stroke) 88%, #fff);
            box-shadow: 0 18px 40px -28px rgba(24, 55, 40, 0.35);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 14px;
            animation: rise 600ms ease-out;
        }

        .controls {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(6, minmax(90px, 1fr));
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
        }

        .field input,
        .field select,
        button {
            border: 1px solid var(--stroke);
            border-radius: 10px;
            background: #fff;
            color: var(--ink);
            font: inherit;
            padding: 10px 12px;
            min-height: 40px;
        }

        .field input:focus,
        .field select:focus,
        button:focus {
            outline: 2px solid color-mix(in srgb, var(--accent) 60%, transparent);
            outline-offset: 1px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button {
            cursor: pointer;
            font-weight: 700;
        }

        .btn-primary {
            background: linear-gradient(145deg, #2a8f5d, #176943);
            border: none;
            color: #fff;
        }

        .btn-secondary {
            background: #fff;
            color: var(--ink);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin: 14px 0;
        }

        .stat {
            background: #fff;
            border: 1px solid var(--stroke);
            border-radius: 12px;
            padding: 12px;
        }

        .stat .label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .stat strong {
            font-size: clamp(18px, 2.6vw, 28px);
        }

        .legend {
            margin: 4px 0 0;
            display: flex;
            gap: 16px;
            justify-content: center;
            color: var(--muted);
            font-size: 12px;
        }

        .legend span {
            display: inline-flex;
            gap: 8px;
            align-items: center;
        }

        .swatch {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            border: 1px solid #183826;
            display: inline-block;
        }

        .swatch.filled {
            background: #183826;
        }

        .swatch.empty {
            background: var(--empty);
        }

        .section {
            margin-bottom: 14px;
            break-inside: avoid;
        }

        .section-title {
            margin: 0 0 6px;
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(52, var(--dot-size));
            gap: var(--dot-gap);
            justify-content: center;
        }

        .dot {
            width: var(--dot-size);
            height: var(--dot-size);
            border-radius: 2px;
            border: 1px solid #1a3a28;
            background: var(--empty);
        }

        .dot.filled {
            background: #193a28;
        }

        .dot.future {
            opacity: 0.34;
        }

        .footer-note {
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            text-align: center;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 980px) {
            :root {
                --dot-size: 8px;
                --dot-gap: 1px;
            }

            .controls {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 520px) {
            :root {
                --dot-size: 6px;
                --dot-gap: 1px;
            }

            .page {
                padding: 18px 8px 32px;
            }

            .btn-group {
                flex-direction: column;
            }
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 6mm;
            }

            * {
                animation: none !important;
                transition: none !important;
                text-shadow: none !important;
                box-shadow: none !important;
                backdrop-filter: none !important;
            }

            body {
                background: #fff;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }

            .page {
                max-width: none;
                margin: 0;
                padding: 0;
            }

            .panel.controls-panel,
            .footer-note {
                display: none !important;
            }

            .panel {
                border: 1px solid #b5bfb8;
                border-radius: 6px;
                margin-bottom: 6px;
                padding: 6px;
            }

            :root {
                --dot-size: 6px;
                --dot-gap: 1px;
            }

            .section {
                margin-bottom: 6px;
                break-inside: auto;
                page-break-inside: auto;
            }

            .section-title {
                margin: 0 0 2px;
                font-size: 10px;
                color: #222;
            }

            .stats {
                margin: 4px 0;
                gap: 6px;
            }

            .stat {
                border: 1px solid #9ea8a0;
                border-radius: 4px;
                padding: 4px;
            }

            .legend {
                margin-top: 2px;
                font-size: 10px;
            }

            .dot {
                border: 1px solid #111;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }

            .dot.filled {
                background: #111 !important;
            }

            .dot.future {
                opacity: 1 !important;
                background: #fff !important;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="hero">
            <h1 id="title">MY LIFE IN WEEKS</h1>
            <p id="subtitle" class="subtitle"></p>
        </header>

        <section class="panel controls-panel">
            <form id="controls" class="controls">
                <div class="field">
                    <label for="lang" id="label-lang">Language</label>
                    <select id="lang">
                        <option value="zh">繁體中文</option>
                        <option value="en">English</option>
                    </select>
                </div>

                <div class="field">
                    <label for="birthday" id="label-birthday">Birthday</label>
                    <input id="birthday" type="date" value="1958-12-28" required>
                </div>

                <div class="field">
                    <label for="lifespan" id="label-lifespan">Lifespan (years)</label>
                    <input id="lifespan" type="number" value="90" min="1" max="130" required>
                </div>

                <div class="field">
                    <label for="yearsPerSection" id="label-section">Years per section</label>
                    <input id="yearsPerSection" type="number" value="10" min="1" max="30" required>
                </div>

                <div class="field">
                    <label for="theme" id="label-theme">Theme</label>
                    <select id="theme">
                        <option value="forest">Forest</option>
                        <option value="ocean">Ocean</option>
                        <option value="mono">Mono</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-primary" id="btn-generate">Update</button>
                    <button type="button" class="btn-secondary" id="btn-print">Print A4 PDF</button>
                </div>
            </form>
        </section>

        <section class="panel">
            <div class="stats" id="stats"></div>
            <div class="legend">
                <span><i class="swatch filled"></i><span id="legend-lived">Lived</span></span>
                <span><i class="swatch empty"></i><span id="legend-future">Future</span></span>
            </div>
        </section>

        <section class="panel">
            <div id="grid-container"></div>
        </section>

        <p id="footer-note" class="footer-note"></p>
    </main>

    <script>
        (function () {
            const TEXT = {
                zh: {
                    title: "我的人生週曆",
                    subtitle: "以 52 週為單位，看到你的人生進度",
                    language: "語言",
                    birthday: "生日",
                    lifespan: "預估壽命（年）",
                    section: "每區年數",
                    theme: "主題",
                    update: "更新圖表",
                    print: "列印 A4 / 另存 PDF",
                    lived: "已走過",
                    future: "未來",
                    bornOn: "生日",
                    today: "今天",
                    age: "目前年齡",
                    weeksLived: "已走過週數",
                    progress: "人生進度",
                    years: "歲",
                    weekUnit: "週",
                    sectionLabel: (start, end) => `${start}-${end} 歲`,
                    dotTitle: (week, date) => `第 ${week} 週｜${date}`,
                    footer: "提示：可在上方修改生日、壽命、區塊年數與主題，列印時會自動套用 A4 版面。"
                },
                en: {
                    title: "My Life in Weeks",
                    subtitle: "A 52-week view of your life timeline",
                    language: "Language",
                    birthday: "Birthday",
                    lifespan: "Lifespan (years)",
                    section: "Years per section",
                    theme: "Theme",
                    update: "Update",
                    print: "Print A4 PDF",
                    lived: "Lived",
                    future: "Future",
                    bornOn: "Born",
                    today: "Today",
                    age: "Current age",
                    weeksLived: "Weeks lived",
                    progress: "Progress",
                    years: "years",
                    weekUnit: "weeks",
                    sectionLabel: (start, end) => `Age ${start}-${end}`,
                    dotTitle: (week, date) => `Week ${week} | ${date}`,
                    footer: "Tip: adjust birthday, lifespan, section size, and theme above. Print uses A4 formatting."
                }
            };

            const THEME = {
                forest: {
                    accent: "#1f7a4c",
                    accentSoft: "#d8f0e0",
                    ink: "#13211a",
                    empty: "#f6fbf7"
                },
                ocean: {
                    accent: "#1b6ca8",
                    accentSoft: "#d7ebf9",
                    ink: "#132131",
                    empty: "#f5f9ff"
                },
                mono: {
                    accent: "#262626",
                    accentSoft: "#ececec",
                    ink: "#141414",
                    empty: "#fafafa"
                }
            };

            const controls = document.getElementById("controls");
            const langEl = document.getElementById("lang");
            const birthdayEl = document.getElementById("birthday");
            const lifespanEl = document.getElementById("lifespan");
            const yearsPerSectionEl = document.getElementById("yearsPerSection");
            const themeEl = document.getElementById("theme");

            function setTheme(name) {
                const t = THEME[name] || THEME.forest;
                document.documentElement.style.setProperty("--accent", t.accent);
                document.documentElement.style.setProperty("--accent-soft", t.accentSoft);
                document.documentElement.style.setProperty("--ink", t.ink);
                document.documentElement.style.setProperty("--empty", t.empty);
            }

            function localDate(date, lang) {
                const locale = lang === "zh" ? "zh-TW" : "en-US";
                return date.toLocaleDateString(locale, { year: "numeric", month: "short", day: "numeric" });
            }

            function render() {
                const lang = langEl.value;
                const t = TEXT[lang];

                const birthday = new Date(birthdayEl.value + "T00:00:00");
                const lifespan = Math.max(1, parseInt(lifespanEl.value, 10) || 90);
                const yearsPerSection = Math.max(1, parseInt(yearsPerSectionEl.value, 10) || 10);
                const weeksPerYear = 52;
                const totalWeeks = lifespan * weeksPerYear;

                const today = new Date();
                const weeksLivedRaw = Math.floor((today - birthday) / (1000 * 60 * 60 * 24 * 7));
                const weeksLived = Math.min(Math.max(0, weeksLivedRaw), totalWeeks);
                const ageYears = Math.floor(weeksLived / weeksPerYear);
                const progress = ((weeksLived / totalWeeks) * 100).toFixed(1);

                document.getElementById("title").textContent = t.title;
                document.getElementById("subtitle").textContent =
                    `${t.bornOn}: ${localDate(birthday, lang)} | ${t.age}: ${ageYears} ${t.years}`;

                document.getElementById("label-lang").textContent = t.language;
                document.getElementById("label-birthday").textContent = t.birthday;
                document.getElementById("label-lifespan").textContent = t.lifespan;
                document.getElementById("label-section").textContent = t.section;
                document.getElementById("label-theme").textContent = t.theme;
                document.getElementById("btn-generate").textContent = t.update;
                document.getElementById("btn-print").textContent = t.print;
                document.getElementById("legend-lived").textContent = t.lived;
                document.getElementById("legend-future").textContent = t.future;
                document.getElementById("footer-note").textContent = t.footer;

                const stats = document.getElementById("stats");
                stats.innerHTML = `
                    <article class="stat">
                        <span class="label">${t.weeksLived}</span>
                        <strong>${weeksLived.toLocaleString()}</strong> ${t.weekUnit}
                    </article>
                    <article class="stat">
                        <span class="label">${t.progress}</span>
                        <strong>${progress}%</strong>
                    </article>
                    <article class="stat">
                        <span class="label">${t.today}</span>
                        <strong style="font-size:1.1rem">${localDate(today, lang)}</strong>
                    </article>
                `;

                const gridContainer = document.getElementById("grid-container");
                gridContainer.innerHTML = "";

                const sections = Math.ceil(lifespan / yearsPerSection);
                let weekIndex = 0;

                for (let s = 0; s < sections; s++) {
                    const startYear = s * yearsPerSection;
                    const endYear = Math.min((s + 1) * yearsPerSection, lifespan);
                    const sectionYears = endYear - startYear;
                    const sectionWeeks = sectionYears * weeksPerYear;

                    const section = document.createElement("section");
                    section.className = "section";

                    const title = document.createElement("h3");
                    title.className = "section-title";
                    title.textContent = t.sectionLabel(startYear, endYear);
                    section.appendChild(title);

                    const grid = document.createElement("div");
                    grid.className = "grid";

                    for (let i = 0; i < sectionWeeks; i++) {
                        const dot = document.createElement("span");
                        const lived = weekIndex < weeksLived;
                        dot.className = lived ? "dot filled" : "dot future";
                        const weekDate = new Date(birthday);
                        weekDate.setDate(weekDate.getDate() + weekIndex * 7);
                        dot.title = t.dotTitle(weekIndex + 1, localDate(weekDate, lang));
                        grid.appendChild(dot);
                        weekIndex += 1;
                    }

                    section.appendChild(grid);
                    gridContainer.appendChild(section);
                }
            }

            controls.addEventListener("submit", function (event) {
                event.preventDefault();
                render();
            });

            langEl.addEventListener("change", render);
            themeEl.addEventListener("change", function () {
                setTheme(themeEl.value);
                render();
            });
            birthdayEl.addEventListener("change", render);
            lifespanEl.addEventListener("change", render);
            yearsPerSectionEl.addEventListener("change", render);

            document.getElementById("btn-print").addEventListener("click", function () {
                render();
                setTimeout(function () {
                    window.print();
                }, 120);
            });

            setTheme(themeEl.value);
            render();
        })();
    </script>
</body>
</html>
